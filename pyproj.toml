[build-system]
requires = ["setuptools>=72.0", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "archagent"
version = "0.1.0"
description = "Local AI tool that generates full project architectures from a plain-English idea"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"

dependencies = [
    "aiohttp==3.9.5",
    "fastapi==0.111.0",
    "uvicorn[standard]==0.29.0",
    "python-multipart==0.0.9",
    "pydantic==2.7.1",
    "typer==0.12.3",
    "rich==13.7.1",
]

[project.optional-dependencies]
dev = [
    "pytest==8.2.0",
    "pytest-asyncio==0.23.6",
    "pytest-cov==5.0.0",
]

[project.scripts]
archagent = "cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["cli*", "api*", "core*", "input*", "llm*", "planner*", "formatter*", "validator*", "exporter*", "shared*"]

# ── Pytest ─────────────────────────────────────────────────────────────────────

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

# ── Coverage ───────────────────────────────────────────────────────────────────

[tool.coverage.run]
source = ["."]
omit = ["tests/*", ".venv/*", "web/*", "outputs/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70

# ── Ruff (Linter + Formatter) ──────────────────────────────────────────────────

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default args (FastAPI depends on this)
]

[tool.ruff.lint.isort]
known-first-party = ["cli", "api", "core", "input", "llm", "planner", "formatter", "validator", "exporter", "shared"]

# ── Mypy (Type Checking) ───────────────────────────────────────────────────────

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["web/", "outputs/", ".venv/"]
